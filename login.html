<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body{
            background:#111;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#1e1e1e;
            padding:40px;
            border-radius:15px;
            width:300px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:10px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#9333ea;
            color:white;
            border:none;
            border-radius:10px;
        }

        a{
            color:#a855f7;
        }
    </style>
</head>

<body>

<div class="box">

<h1>Login</h1>

<form method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>
No account?
<a href="/register">Register</a>
</p>

</div>

</body>
</html>
